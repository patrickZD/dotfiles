# ~/.tmux.conf
# ============================================
# ESSENTIAL SETTINGS
# ============================================
# Fix Vim ESC delay (tmux 3.5+ already defaults to 10ms)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Show pane numbers for two seconds.
set -g display-panes-time 2000

# Renumber windows when one is closed
set -g renumber-windows on

# OSC52 clipboard passthrough (works in most terminals)
set -g set-clipboard on

# Pipe tmux copy-mode selections to the Wayland clipboard.
set -g copy-command "wl-copy"

# Forward extended/enhanced key events (kitty keyboard protocol) to apps that
# request them. Without this, tmux drops the CSI-u encoded Ctrl+V that kitty
# sends, so Claude Code never receives the keypress and image paste does nothing.
set -s extended-keys on

# Allow DCS passthrough for graphics protocols (e.g. inline image preview)
set -g allow-passthrough on

# Refresh kitty/Wayland env vars when reattaching (keeps them valid across reboots)
set -g update-environment "KITTY_WINDOW_ID KITTY_PID KITTY_PUBLIC_KEY KITTY_INSTALLATION_DIR XDG_RUNTIME_DIR XDG_SESSION_TYPE WAYLAND_DISPLAY DISPLAY XAUTHORITY"

# Activity monitoring — highlight window in status bar, no bell
setw -g monitor-activity on
set -g visual-activity off

# Enable mouse support
set -g mouse on

# Do not let mouse wheel enter copy mode; mouse drag still uses copy mode for selection.
bind -T root WheelUpPane if -F "#{alternate_on}" { send-keys -M }
bind -T root WheelDownPane if -F "#{alternate_on}" { send-keys -M }
bind -T root MouseDrag1Pane if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
unbind -T root MouseDown1ScrollbarUp
unbind -T root MouseDown1ScrollbarDown
unbind -T root MouseDrag1ScrollbarSlider
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
unbind -T prefix PPage

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors. Keep TERM as tmux-256color inside tmux;
# declare what the OUTER terminal (kitty) supports via terminal-features:
# RGB = truecolor, extkeys = extended keys needed by extended-keys above.
set -g default-terminal "tmux-256color"
set -as terminal-features "xterm-kitty:RGB:extkeys"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================
# Change prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap current pane with a specified pane number
bind @ command-prompt -p "swap with pane:" "swap-pane -t '%%'"

# Send the top/bottom N lines from one pane to another pane in the current window.
bind T command-prompt -F -I "#{pane_index},,10" -p "source pane,target pane,lines" { run-shell -b "$HOME/.local/bin/tmux-pane-send-lines tail '#{window_id}' '%1' '%2' '%3'" }
bind G command-prompt -F -I "#{pane_index},,10" -p "source pane,target pane,lines" { run-shell -b "$HOME/.local/bin/tmux-pane-send-lines head '#{window_id}' '%1' '%2' '%3'" }

# ============================================
# APPEARANCE
# ============================================
# Color palette (change values here to retheme)
color_orange="colour166"
color_purple="colour134"
color_green="colour076"
color_blue="colour39"
color_yellow="colour220"
color_red="colour160"
color_black="#13161d"
color_white="white"

color_dark="$color_black"
color_light="$color_white"
color_session_text="#00e68a"
color_status_text="colour245"
color_main="#00e68a"
color_secondary="$color_purple"
color_level_ok="$color_green"
color_level_warn="$color_yellow"
color_level_stress="$color_red"
color_window_off_indicator="colour088"
color_window_off_status_bg="colour238"
color_window_off_status_current_bg="colour254"

# Powerline separators — requires a Nerd Font / Powerline-patched font
separator_powerline_left=""
separator_powerline_right=""

# Mode style (copy mode highlight)
set -g mode-style "fg=default,bg=$color_main"

# Command line / message style
set -g message-style "fg=$color_main,bg=$color_dark"

# Status bar global settings
set -g status-style "fg=$color_status_text,bg=$color_dark"
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 100

# Window status — powerline style for active window
set -g window-status-separator ""
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=$color_dark,bold,bg=$color_main"
setw -g window-status-current-format "#[fg=$color_dark,bg=$color_main]$separator_powerline_right#[default] #I:#W #[fg=$color_main,bg=$color_dark]$separator_powerline_right#[default]"
setw -g window-status-activity-style "fg=$color_main"

# Pane borders + title bar (active pane highlighted in main color)
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=$color_dark#,bg=$color_main] #P #[default],#[fg=colour238] #P }"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=$color_main"

# Pane scrollbars — show scrollback position (tmux 3.6+)
set -g pane-scrollbars on
set -g pane-scrollbars-position right

# Status bar widgets
wg_session="#[fg=$color_session_text] #S #[default]"
wg_date="#[fg=$color_secondary]%h %d %H:%M#[default]"
wg_user_host="#[fg=$color_secondary]#(whoami)#[default]@#H"
wg_is_zoomed="#[fg=$color_dark,bg=$color_secondary]#{?window_zoomed_flag,[Z],}#[default]"
wg_is_keys_off="#[fg=$color_light,bg=$color_window_off_indicator]#([ $(tmux show-option -qv key-table) = 'off' ] && echo 'OFF')#[default]"
wg_battery="#{battery_status_fg} #{battery_icon} #{battery_percentage}"

set -g status-left "$wg_session"
set -g status-right "#{prefix_highlight} $wg_is_keys_off $wg_is_zoomed | $wg_user_host | $wg_date $wg_battery #{online_status}"

# tmux-prefix-highlight config
set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "$color_dark"
set -g @prefix_highlight_bg "$color_secondary"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=$color_dark,bg=$color_secondary"

# tmux-battery config
set -g @batt_color_full_charge "#[fg=$color_level_ok]"
set -g @batt_color_high_charge "#[fg=$color_level_ok]"
set -g @batt_color_medium_charge "#[fg=$color_level_warn]"
set -g @batt_color_low_charge "#[fg=$color_level_stress]"

# tmux-online-status config
set -g @online_icon "#[fg=$color_level_ok]●#[default]"
set -g @offline_icon "#[fg=$color_level_stress]●#[default]"

# ============================================
# COPY MODE
# ============================================
# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode Escape send -X cancel
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X stop-selection
bind -T copy-mode MouseDragEnd1Pane send -X stop-selection

# Clear stale mouse selections when clicking elsewhere in copy mode.
bind -T copy-mode-vi MouseDown1Pane select-pane \; send -X clear-selection
bind -T copy-mode MouseDown1Pane select-pane \; send -X clear-selection
bind -T copy-mode-vi C-c send -X copy-pipe-and-cancel
bind -T copy-mode C-c send -X copy-pipe-and-cancel

# ============================================
# PLUGINS (via TPM)
# ============================================
# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-online-status'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-pane-contents-area 'full'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
