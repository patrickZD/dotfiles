# Kitty configuration

# Font
font_family      DejaVu Sans Mono for Powerline
bold_font        DejaVu Sans Mono for Powerline Bold
italic_font      auto
bold_italic_font auto
font_size        13.0

# Powerline symbols — map to Powerline font to ensure correct height rendering
symbol_map U+E0B0-U+E0B3 DejaVu Sans Mono for Powerline

# Colors (matched from GNOME Terminal)
foreground #d0cfcc
background #171421

# 16-color palette
color0  #171421
color1  #c01c28
color2  #26a269
color3  #a2734c
color4  #12488b
color5  #a347ba
color6  #2aa1b3
color7  #d0cfcc
color8  #5e5c64
color9  #f66151
color10 #33da7a
color11 #e9ad0c
color12 #2a7bde
color13 #c061cb
color14 #33c7de
color15 #ffffff

# Cursor
cursor_shape block
cursor_blink_interval 0

# Scrollback
scrollback_lines 50000

# Mouse
mouse_hide_wait 3.0

# Window
window_padding_width 4
hide_window_decorations no
remember_window_size yes

# Bell
enable_audio_bell no

# Clipboard shortcuts
clipboard_control write-clipboard write-primary read-clipboard read-primary
# Text paste uses ctrl+shift+v (terminal convention). Do NOT map ctrl+v here:
# kitty would intercept it at the terminal layer and the keypress would never
# reach the running app, breaking Claude Code's ctrl+v image paste.
map ctrl+shift+v paste_from_clipboard
map ctrl+c copy_and_clear_or_interrupt
